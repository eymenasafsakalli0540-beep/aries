<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIES AI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0d0f; 
            color: #ffffff;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sol taraftaki menü paneli (Sidebar) */
        .sidebar {
            width: 260px;
            background-color: #090a0c;
            border-right: 3px solid #00bcff; 
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .logo-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }
        
        /* SVG Logoların Boyutu */
        .sidebar .logo-svg {
            width: 100px;
            height: 100px;
        }
        
        .logo-title {
            color: #00bcff; 
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0;
        }

        .new-chat-btn {
            border: 2px solid #ffffff;
            border-radius: 20px;
            background: transparent;
            color: #ffffff;
            padding: 10px 20px;
            width: 100%;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .new-chat-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Sağ taraftaki ana alan */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .main-content .logo-svg {
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
        }

        .welcome-title {
            font-size: 3.5rem;
            font-weight: 300;
            color: #ffffff;
            margin: 0 0 50px 0;
            letter-spacing: -2px;
        }

        .input-form {
            width: 100%;
            max-width: 900px;
            display: flex;
            align-items: center;
            position: relative;
        }
        .chat-input {
            width: 100%;
            padding: 20px 30px;
            background-color: transparent;
            border: 2px solid #ffffff;
            border-radius: 40px; 
            color: #ffffff;
            font-size: 1.4rem;
            outline: none;
            text-align: left;
        }
        .chat-input::placeholder {
            color: #757575;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-group">
            <svg class="logo-svg" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M60 120C60 80 90 50 110 50" stroke="#00E5FF" stroke-width="10" stroke-linecap="round"></path>
                <path d="M160 120C160 80 130 50 110 50" stroke="#00E5FF" stroke-width="10" stroke-linecap="round"></path>
                <circle cx="110" cy="110" r="15" fill="#00E5FF"></circle>
            </svg>
            <h1 class="logo-title">ARIES AI</h1>
        </div>
        <button class="new-chat-btn" onclick="window.location.reload()">Yeni Sohbet</button>
    </div>

    <div class="main-content">
        <svg class="logo-svg" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M60 120C60 80 90 50 110 50" stroke="#00E5FF" stroke-width="10" stroke-linecap="round"></path>
            <path d="M160 120C160 80 130 50 110 50" stroke="#00E5FF" stroke-width="10" stroke-linecap="round"></path>
            <circle cx="110" cy="110" r="15" fill="#00E5FF"></circle>
        </svg>
        
        <h1 class="welcome-title">Ne sormak ister siniz</h1>

        <form action="/ask" method="POST" class="input-form">
            <input type="text" name="message" class="chat-input" placeholder="Ne sormak ister siniz..." required autofocus>
        </form>
    </div>

</body>
</html>

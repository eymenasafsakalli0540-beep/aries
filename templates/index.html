<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIES AI</title>
    <style>
        /* Modern ve Koyu Gemini Teması */
        body {
            margin: 0;
            padding: 0;
            background-color: #121216; /* Çok koyu gri/siyah arka plan */
            /* Hafif lacivert modern geçiş */
            background-image: 
                radial-gradient(at 50% 100%, #1a2236 0px, transparent 50%),
                radial-gradient(at 50% -20%, #1e284a 0px, transparent 50%);
            color: #e3e3e3;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Merkeze Odaklanmış Ana Alan */
        .main-container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 👑 Karşılama Başlığı */
        .welcome-title {
            font-size: 3rem;
            font-weight: 300; /* Çok ince ve modern */
            margin-bottom: 50px;
            letter-spacing: -1px;
        }

        /* Gemini Tarzı Yuvarlak Giriş Alanı */
        .search-bar {
            width: 100%;
            background-color: #26262d;
            border-radius: 50px; /* Tam yuvarlak köşeler */
            padding: 10px 20px;
            display: flex;
            align-items: center;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .search-bar:hover, .search-bar:focus-within {
            background-color: #2e2e36;
            box-shadow: 0 6px 10px rgba(0,0,0,0.3);
        }

        /* Sol taraftaki Artı (+) Simgesi */
        .plus-icon {
            color: #a0a0a0;
            font-size: 1.5rem;
            margin-right: 15px;
            cursor: pointer;
        }

        /* Giriş Kutusu */
        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e3e3e3;
            font-size: 1.2rem;
            outline: none;
            padding: 10px 0;
            font-weight: 300;
        }

        .chat-input::placeholder {
            color: #757575;
            font-weight: 300;
        }

        /* Sağ taraftaki Flash ve Mikrofon Grubu */
        .right-icons {
            display: flex;
            align-items: center;
            color: #757575;
            gap: 15px;
        }

        .flash-text {
            font-size: 0.9rem;
            font-weight: 400;
            cursor: pointer;
        }

        .mic-icon {
            font-size: 1.3rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <h1 class="welcome-title">Ne sormak istersiniz</h1>

        <form action="/ask" method="POST" class="search-bar">
            
            <span class="plus-icon">&#65291;</span>
            
            <input type="text" name="message" class="chat-input" placeholder="Ne sormak istersiniz" required autofocus>
            
            <div class="right-icons">
                <span class="flash-text">Flash &#9661;</span>
                <span class="mic-icon">&#127897;</span>
            </div>

        </form>

    </div>

</body>
</html>

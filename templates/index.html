<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIES AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background: #131314; font-family: 'Inter', sans-serif; color: #e3e3e3; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { padding: 15px 20px; background: #1e1e1f; border-bottom: 1px solid #2d2d2e; display: flex; justify-content: space-between; align-items: center; }
        header h1 { color: #f0f4f9; font-size: 1.2rem; font-weight: 600; }
        .user-info { font-size: 0.9rem; color: #94a3b8; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 12px; font-size: 1rem; line-height: 1.5; }
        .user { align-self: flex-end; background: #2a2a2a; color: #f0f4f9; }
        .aries { align-self: flex-start; background: #1e1e1f; border: 1px solid #2d2d2e; }
        .input-container { padding: 20px; display: flex; justify-content: center; }
        .input-area { width: 100%; max-width: 800px; display: flex; gap: 10px; background: #1e1e1f; padding: 8px 12px; border-radius: 24px; border: 1px solid #2d2d2e; }
        input { flex: 1; background: transparent; border: none; padding: 10px; color: #e3e3e3; outline: none; font-size: 1rem; }
        .send-btn { background: #333537; color: white; border: none; padding: 0 20px; border-radius: 18px; cursor: pointer; font-weight: 500; }
        .send-btn:hover { background: #4a4c4e; }
    </style>
</head>
<body>
    <header>
        <div class="user-info">🟢 Kaptan: <strong>{{ kullanici }}</strong></div>
        <h1>ARIES AI</h1>
        <div style="width: 70px;"></div>
    </header>

    <div id="chat-box">
        <div class="msg aries">Selam {{ kullanici }} kanka! Ben Aries. Arayüzümüz eski, sarsılmaz gücüne geri döndü. Ama arkadaki zekam artık Coğrafya, Tarih, Matematik, Fen ve tüm derslerde bir canavar! Bana dilediğin dersi sorabilirsin, ödevleri halledelim!</div>
    </div>
    
    <div class="input-container">
        <div class="input-area">
            <input type="text" id="soru" placeholder="Aries'e bir ders sorusu sor...">
            <button class="send-btn" onclick="gonder()">Gönder</button>
        </div>
    </div>

    <script>
        async function gonder() {
            const input = document.getElementById('soru');
            const box = document.getElementById('chat-box');
            if (!input.value) return;

            box.innerHTML += `<div class="msg user">${input.value}</div>`;
            const soru = input.value;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            const bekleID = "bekle-" + Date.now();
            box.innerHTML += `<div class="msg aries" id="${bekleID}">Aries düşünüyor...</div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch('/sor', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({soru: soru})
                });
                const data = await response.json();
                document.getElementById(bekleID).innerText = data.cevap;
            } catch {
                document.getElementById(bekleID).innerText = "Hata oluştu kanka.";
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>

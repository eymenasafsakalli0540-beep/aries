<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            height: 100vh; 
            display: flex; 
        }
        /* Sol panel */
        #sidebar { 
            width: 200px; 
            border-right: 1px solid #1a1a1a; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
        }
        .logo { color: #00e5ff; font-weight: bold; font-size: 20px; margin-bottom: 30px; }
        .yeni-analiz { 
            background: #1a1a1a; 
            color: #fff; 
            border: 1px solid #333; 
            padding: 10px; 
            border-radius: 5px; 
            text-align: center; 
            cursor: pointer; 
        }
        .dev { font-size: 12px; color: #666; }
        
        /* Ana alan */
        #main { flex-grow: 1; padding: 40px; position: relative; }
        .tatil-yazi { position: absolute; top: 20px; right: 40px; text-align: right; line-height: 1.2; }
        
        /* Mesaj kutusu */
        .mesaj-balonu { 
            border: 1px solid #00e5ff; 
            border-radius: 20px; 
            padding: 15px 25px; 
            width: fit-content; 
            margin-top: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Giriş alanı */
        .input-wrapper { 
            position: absolute; 
            bottom: 40px; 
            left: 40px; 
            right: 40px; 
        }
        input { 
            width: 100%; 
            background: #111; 
            border: 1px solid #333; 
            padding: 15px; 
            color: #888; 
            border-radius: 50px; 
            outline: none; 
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div>
            <div class="logo">ARIES AI</div>
            <div class="yeni-analiz">Yeni Analiz</div>
        </div>
        <div class="dev">DEVELOPER: <span style="color:#00e5ff">TÜW</span></div>
    </div>

    <div id="main">
        <div class="tatil-yazi">Tatil Bitene<br>Kadar Yokuz</div>
        
        <div class="mesaj-balonu">
            <span style="color:#00e5ff">•</span> 
            ARIES AI: Merhaba TÜW. Web sitemiz yayına hazır. Tüm motorlar aktif edildi. Seni dinliyorum kanka.
        </div>

        <div class="input-wrapper">
            <input type="text" placeholder="Bir soru sorun...">
        </div>
    </div>

</body>
</html>

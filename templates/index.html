<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>ARIES AI | TÜW Akıllı Asistan</title>
    <meta name="description" content="ARIES AI - TÜW tarafından geliştirilen yeni nesil yapay zeka asistanı. Fen, Tarih ve Fizik branşlarında uzman analizler.">
    <meta name="keywords" content="ARIES AI, TÜW, Yapay Zeka, Chatbot, Fen Bilimleri, Fizik Hesaplama">
    <meta name="author" content="TÜW">

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root { --bg: #050505; --accent: #00fbff; --border: #1f1f22; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Tam Ekran & Mobil Fix */
        body, html { 
            width: 100%; height: 100dvh; background: var(--bg); 
            color: #e4e4e7; font-family: 'Inter', sans-serif; overflow: hidden; 
        }

        .app-wrapper { display: flex; width: 100%; height: 100%; flex-direction: row; }

        @media (max-width: 768px) {
            .app-wrapper { flex-direction: column; }
            .sidebar { width: 100% !important; height: 60px !important; flex-direction: row !important; align-items: center; justify-content: space-between; padding: 0 20px !important; border-right: none !important; border-bottom: 1px solid var(--border); }
            .sidebar .new-btn { display: none; }
            #chat-flow { padding: 20px 5% !important; }
        }

        .sidebar { width: 260px; height: 100%; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; flex-shrink: 0; }
        .logo { font-size: 1.4rem; font-weight: 900; color: white; }
        .logo span { color: var(--accent); }

        .main-view { flex-grow: 1; height: 100%; display: flex; flex-direction: column; min-width: 0; background: radial-gradient(circle at 50% 0%, #111, #050505); }

        .top-bar { height: 60px; display: flex; align-items: center; justify-content: flex-end; padding: 0 25px; border-bottom: 1px solid rgba(255,255,255,0.03); }

        #chat-flow { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 20px; -webkit-overflow-scrolling: touch; }
        #chat-flow::-webkit-scrollbar { width: 4px; }
        #chat-flow::-webkit-scrollbar-thumb { background: #333; }

        /* Grup ve Balon Düzeni */
        .ai-msg-group { display: flex; flex-direction: column; align-self: flex-start; gap: 6px; max-width: 85%; }
        .msg-logo { width: 32px; height: 32px; margin-left: 5px; } /* Balonun üstündeki logo boyutu */

        .bubble { max-width: 85%; padding: 18px; border-radius: 18px; line-height: 1.6; animation: fadeInUp 0.3s ease; }
        .ai { background: #0c0c0e; border: 1px solid var(--border); align-self: flex-start; border-left: 4px solid var(--accent); max-width: 100%; }
        .user { background: #18181b; align-self: flex-end; border-right: 4px solid #38bdf8; }

        .input-holder { padding: 20px 15% 40px; }
        .input-box { background: #111; border: 1px solid #222; border-radius: 15px; padding: 12px 25px; display: flex; gap: 15px; align-items: center; }
        input { background: transparent; border: none; color: white; flex-grow: 1; outline: none; font-size: 16px; }

        /* Backend Rozetleri */
        .expert-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .badge-sozel { background-color: #ff5722; color: white; }
        .badge-sayisal { background-color: #4caf50; color: white; }
        .badge-cografya { background-color: #00bcff; color: white; }
        .formula-box { background-color: #1a1c23; padding: 8px; border-radius: 6px; margin: 8px 0; font-family: monospace; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo">ARIES <span>AI</span></div>
            <button class="new-btn" style="margin-top:20px; background:#111; color:white; border:1px solid #333; padding:10px; border-radius:8px; cursor:pointer;" onclick="location.reload()">Yeni Analiz</button>
            <div style="margin-top:auto; font-size:0.7rem; color:#444;">DEVELOPER: <b style="color:var(--accent)">TÜW</b></div>
        </aside>

        <main class="main-view">
            <header class="top-bar">
                <div id="g_id_onload" data-client_id="YOUR_CLOUD_ID" data-callback="onSignIn"></div>
                <div class="g_id_signin" data-type="standard"></div>
            </header>

            <div id="chat-flow">
                <div class="ai-msg-group">
                    <svg class="msg-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 40,130 A 65,65 0 0,1 160,130" stroke="#00E5FF" stroke-width="14" stroke-linecap="round" fill="none" />
                        <circle cx="100" cy="130" r="18" fill="#00E5FF" />
                    </svg>
                    <div class="bubble ai"><b>ARIES AI:</b> Merhaba <b>TÜW</b>. Web sitemiz yayına hazır. Tüm motorlar aktif edildi. Seni dinliyorum kanka.</div>
                </div>
            </div>

            <div class="input-holder">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="Bir soru sorun..." onkeypress="if(event.keyCode==13) send()">
                    <button onclick="send()" style="background:none; border:none; color:var(--accent); font-size:1.5rem; cursor:pointer;">➔</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Ortak SVG logo şablonumuz
        const logoSvgTemplate = `
            <svg class="msg-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <path d="M 40,130 A 65,65 0 0,1 160,130" stroke="#00E5FF" stroke-width="14" stroke-linecap="round" fill="none" />
                <circle cx="100" cy="130" r="18" fill="#00E5FF" />
            </svg>
        `;

        function send() {
            const input = document.getElementById('userInput');
            const flow = document.getElementById('chat-flow');
            const val = input.value.trim();
            if(!val) return;

            // Kullanıcının mesajı sağa ekleniyor
            flow.innerHTML += `<div class="bubble user"><b>TÜW:</b><br>${val}</div>`;
            flow.scrollTop = flow.scrollHeight;
            input.value = "";

            // Backend'e istek atılıyor
            fetch('/ask', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: val })
            })
            .then(response => response.json())
            .then(data => {
                // ARIES AI yanıt grubu oluşturuluyor (Logo + Balon)
                flow.innerHTML += `
                    <div class="ai-msg-group">
                        ${logoSvgTemplate}
                        <div class="bubble ai"><b>ARIES AI:</b><br>${data.reply}</div>
                    </div>
                `;
                flow.scrollTop = flow.scrollHeight;
            })
            .catch(error => {
                console.error('Hata:', error);
                flow.innerHTML += `
                    <div class="ai-msg-group">
                        ${logoSvgTemplate}
                        <div class="bubble ai" style="border-left: 4px solid red;"><b>Sistem Hatası:</b> Bağlantı kurulamadı kanka.</div>
                    </div>
                `;
                flow.scrollTop = flow.scrollHeight;
            });
        }

        function onSignIn(resp) { console.log("Google Login Active"); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIES AI</title>
    <style>
        /* 🎨 TASARIM (CSS) BÖLÜMÜ - Tek Dosyada Birleşik */
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0d0f; /* Simsiyah modern arka plan */
            color: #ffffff;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sol taraftaki menü paneli (Sidebar) */
        .sidebar {
            width: 260px;
            background-color: #090a0c;
            border-right: 3px solid #00bcff; /* Senin o kalın mavi çizgin */
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        /* Sol üstteki logon ve başlığın */
        .logo-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }
        .logo-img {
            width: 80px; /* Senin gönderdiğin logonun boyutu */
            margin-bottom: 10px;
        }
        .logo-title {
            color: #00bcff; /* Mavi başlığın */
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0;
        }

        /* "Yeni Sohbet" butonu */
        .new-chat-btn {
            border: 2px solid #ffffff;
            border-radius: 20px;
            background: transparent;
            color: #ffffff;
            padding: 10px 20px;
            width: 100%;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .new-chat-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Sağ taraftaki ana sohbet alanı */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        /* Tam ortadaki büyük logon */
        .center-logo {
            width: 160px; /* Ortadaki logonun boyutu */
            margin-bottom: 30px;
        }

        /* Ortadaki "Ne sormak ister siniz" başlığın */
        .welcome-title {
            font-size: 3.5rem;
            font-weight: 300;
            color: #ffffff;
            margin: 0 0 50px 0;
            letter-spacing: -2px;
        }

        /* Alttaki geniş input kutusu */
        .input-form {
            width: 100%;
            max-width: 900px;
            display: flex;
            align-items: center;
            position: relative;
        }
        .chat-input {
            width: 100%;
            padding: 20px 30px;
            background-color: transparent;
            border: 2px solid #ffffff;
            border-radius: 40px; /* Tam yuvarlak köşeler */
            color: #ffffff;
            font-size: 1.4rem;
            outline: none;
            text-align: left;
        }
        .chat-input::placeholder {
            color: #757575;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-group">
            <img src="{{ url_for('static', filename='image_5.png') }}" alt="ARIES Logo" class="logo-img">
            <h1 class="logo-title">ARIES AI</h1>
        </div>
        <button class="new-chat-btn" onclick="window.location.reload()">Yeni Sohbet</button>
    </div>

    <div class="main-content">
        <img src="{{ url_for('static', filename='image_5.png') }}" alt="ARIES Logo" class="center-logo">
        
        <h1 class="welcome-title">Ne sormak ister siniz</h1>

        <form action="/ask" method="POST" class="input-form">
            <input type="text" name="message" class="chat-input" placeholder="Ne sormak fitser siniz..." required autofocus>
        </form>
    </div>

</body>
</html>

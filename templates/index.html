<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ARIES AI</title>
</head>
<body>

    <input type="text" id="user-input" placeholder="Sorunuzu buraya yazın..." autofocus style="width: 75%; padding: 10px;">
    <button onclick="sendMessage()">Gönder</button>

    <div id="response-box" style="margin-top: 20px; font-size: 1.2rem; font-family: sans-serif;"></div>

    <script>
        // Enter tuşuna basıldığında mesajı otomatik gönderir
        document.getElementById("user-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        function sendMessage() {
            const inputField = document.getElementById("user-input");
            const responseBox = document.getElementById("response-box");
            const message = inputField.value.trim();

            if (message === "") return;

            // app.py içerisindeki request.json.get("message") satırına JSON verisi atıyoruz
            fetch('/ask', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                // app.py'den dönen jsonify({"reply": ...}) verisini buraya basıyoruz
                // innerHTML kullandık çünkü python kodundaki <span class="..."> gibi HTML etiketleri düzgün işlensin
                responseBox.innerHTML = data.reply;
                inputField.value = ""; // Mesaj gönderildikten sonra kutuyu temizle
            })
            .catch(error => {
                console.error('Hata:', error);
                responseBox.innerHTML = "Bir hata oluştu kanka, konsolu kontrol et.";
            });
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIES AI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0d0f; 
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sol taraftaki menü paneli (Sidebar) */
        .sidebar {
            width: 240px;
            background-color: #000000;
            border-right: 4px solid #00bcff; /* Kalın mavi çizgin */
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            box-sizing: border-box;
            position: relative;
        }

        /* Tasarımındaki logonun yanındaki o ince dikey beyaz çizgi detayı */
        .sidebar::after {
            content: "";
            position: absolute;
            right: -10px;
            top: 15%;
            height: 25%;
            width: 1px;
            background-color: rgba(255, 255, 255, 0.4);
        }

        .logo-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }
        
        /* SVG Logo Tasarımı - Tam Ölçü */
        .logo-svg {
            width: 120px;
            height: 120px;
            display: block;
        }
        
        .logo-title {
            color: #00bcff; 
            font-size: 1.4rem;
            font-weight: bold;
            margin: 10px 0 0 0;
            letter-spacing: 1px;
        }

        /* "Yeni Sohbet" butonu */
        .new-chat-btn {
            border: 2px solid #ffffff;
            border-radius: 25px;
            background: transparent;
            color: #ffffff;
            padding: 10px 20px;
            width: 100%;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Sağ taraftaki ana alan */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background-color: #121316;
        }

        .main-content .logo-svg {
            width: 180px;
            height: 180px;
            margin-bottom: 10px;
        }

        /* Ortadaki büyük "Ne sormak ister siniz" yazısı */
        .welcome-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            margin: 0 0 40px 0;
            text-align: center;
        }

        /* Alttaki bembeyaz parlayan geniş input form alanı */
        .input-form {
            width: 100%;
            max-width: 950px;
        }
        
        .chat-input {
            width: 100%;
            padding: 18px 30px;
            background-color: transparent;
            border: 3px solid #ffffff; /* Tam senin çizdiğin beyaz kalınlık */
            border-radius: 50px; 
            color: #ffffff;
            font-size: 1.5rem;
            outline: none;
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-group">
            <svg class="logo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <path d="M 40,130 A 65,65 0 0,1 160,130" stroke="#00E5FF" stroke-width="12" stroke-linecap="round" fill="none" />
                <circle cx="100" cy="130" r="16" fill="#00E5FF" />
            </svg>
            <h1 class="logo-title">ARİES AI</h1>
        </div>
        <button class="new-chat-btn" onclick="window.location.reload()">Yeni Sohbet</button>
    </div>

    <div class="main-content">
        <svg class="logo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <path d="M 40,130 A 65,65 0 0,1 160,130" stroke="#00E5FF" stroke-width="12" stroke-linecap="round" fill="none" />
            <circle cx="100" cy="130" r="16" fill="#00E5FF" />
        </svg>
        
        <h1 class="welcome-title">Ne sormak ister siniz</h1>

        <form action="/ask" method="POST" class="input-form">
            <input type="text" name="message" class="chat-input" autofocus required>
        </form>
    </div>

</body>
</html>

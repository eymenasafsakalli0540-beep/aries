<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARIES AI | TÜW Akıllı Asistan</title>
    <style>
        :root { --bg: #050505; --accent: #00fbff; --border: #1f1f22; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100dvh; background: var(--bg); color: #e4e4e7; font-family: 'Inter', sans-serif; overflow: hidden; }
        .app-wrapper { display: flex; width: 100%; height: 100%; flex-direction: row; }
        @media (max-width: 768px) {
            .app-wrapper { flex-direction: column; }
            .sidebar { width: 100% !important; height: 60px !important; flex-direction: row !important; align-items: center; justify-content: space-between; padding: 0 20px !important; border-right: none !important; border-bottom: 1px solid var(--border); }
            .sidebar .new-btn { display: none; }
            #chat-flow { padding: 20px 5% !important; }
        }
        .sidebar { width: 260px; height: 100%; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; flex-shrink: 0; }
        .logo { font-size: 1.5rem; font-weight: 900; color: white; letter-spacing: 1px; }
        .logo span { color: var(--accent); }
        .main-view { flex-grow: 1; height: 100%; display: flex; flex-direction: column; min-width: 0; background: radial-gradient(circle at 50% 0%, #111, #050505); }
        .top-bar { height: 60px; display: flex; align-items: center; justify-content: flex-end; padding: 0 25px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        #chat-flow { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 20px; -webkit-overflow-scrolling: touch; }
        #chat-flow::-webkit-scrollbar { width: 4px; }
        #chat-flow::-webkit-scrollbar-thumb { background: #333; }
        .bubble { max-width: 85%; padding: 18px; border-radius: 18px; line-height: 1.6; animation: fadeInUp 0.3s ease; font-size: 0.95rem; }
        .ai { background: #0c0c0e; border: 1px solid var(--border); align-self: flex-start; border-left: 4px solid var(--accent); }
        .user { background: #18181b; align-self: flex-end; border-right: 4px solid #38bdf8; }
        .input-holder { padding: 20px 15% 40px; }
        .input-box { background: #111; border: 1px solid #222; border-radius: 15px; padding: 12px 25px; display: flex; gap: 15px; align-items: center; }
        input { background: transparent; border: none; color: white; flex-grow: 1; outline: none; font-size: 16px; }
        .expert-badge { display: inline-block; padding: 3px 7px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .badge-sayisal { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }
        .badge-cografya { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-sozel { background: rgba(249, 115, 22, 0.1); color: #f97316; border: 1px solid rgba(249, 115, 22, 0.3); }
        .formula-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 6px; margin: 10px 0; font-family: 'Courier New', monospace; border: 1px solid #222; color: var(--accent); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo">ARIES <span>AI</span></div>
            <button class="new-btn" style="margin-top:20px; background:#111; color:white; border:1px solid #333; padding:10px; border-radius:8px; cursor:pointer; font-weight:600;" onclick="location.reload()">Yeni Analiz</button>
            <div style="margin-top:auto; font-size:0.7rem; color:#444;">DEVELOPER: <b style="color:var(--accent)">TÜW</b></div>
        </aside>
        <main class="main-view">
            <header class="top-bar">
                <div style="font-size: 0.85rem; color: var(--accent); font-weight: 500;">🟢 DAHİ ÇEKİRDEK AKTİF</div>
            </header>
            <div id="chat-flow">
                <div class="bubble ai"><b>ARIES AI:</b> Merhaba <b>TÜW</b>. Dahi eğitim ve analiz motorum devrede. Matematik, Fen, Türkçe, Sosyal Bilgiler ve İngilizce alanındaki tüm verilerim yüklendi. Seni dinliyorum Kaptan.</div>
            </div>
            <div class="input-holder">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="Aries'e bir soru sorun veya ders başlığı yazın..." onkeypress="if(event.keyCode==13) send()">
                    <button onclick="send()" style="background:none; border:none; color:var(--accent); font-size:1.5rem; cursor:pointer;">➔</button>
                </div>
            </div>
        </main>
    </div>
    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const flow = document.getElementById('chat-flow');
            const val = input.value.trim();
            if(!val) return;
            flow.innerHTML += `<div class="bubble user"><b>TÜW:</b><br>${val}</div>`;
            input.value = "";
            flow.scrollTop = flow.scrollHeight;
            
            const bekleID = "bekle-" + Date.now();
            flow.innerHTML += `<div class="bubble ai" id="${bekleID}"><b>ARIES AI:</b><br>Analiz ediliyor...</div>`;
            flow.scrollTop = flow.scrollHeight;

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: val})
                });
                const data = await response.json();
                let formattedReply = data.reply.replace(/\*\*(.*?)\*\"/g, '<b>$1</b>');
                document.getElementById(bekleID).innerHTML = `<b>ARIES AI:</b><br>${formattedReply}`;
            } catch (error) {
                document.getElementById(bekleID).innerHTML = `<b>ARIES AI:</b><br>Bağlantı hatası Kaptan. Python motorunu kontrol et.`;
            }
            flow.scrollTop = flow.scrollHeight;
        }
    </script>
</body>
</html>
